<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出包魔法师 - Abraca What</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        body {
            background-color: #f0e6d2;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .game-container {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        
        .setup-screen, .game-screen {
            display: none;
        }
        
        .active {
            display: block;
        }
        
        h1, h2, h3 {
            color: #8b5a2b;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .player-setup {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .player-setup select, .player-setup button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 10px;
            border-radius: 5px;
            border: 2px solid #8b5a2b;
        }
        
        .player-setup button {
            background-color: #8b5a2b;
            color: white;
            cursor: pointer;
        }
        
        .player-setup button:hover {
            background-color: #a06c3b;
        }
        
        .game-status {
            background-color: #f8f0e3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
            color: #8b5a2b;
        }
        
        .players-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .player-card {
            flex: 1;
            min-width: 200px;
            background-color: #f8f0e3;
            border: 3px solid #8b5a2b;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .player-card.current-turn {
            border-color: #ff8c00;
            background-color: #fff3e0;
        }
        
        .player-stats {
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .magic-stones {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin: 10px 0;
        }
        
        .stone {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            cursor: default;
        }
        
        .stone.own {
            background-color: #8b5a2b; /* 背面 - 自己看不到 */
            color: transparent;
        }
        
        .stone.other {
            /* 正面 - 能看到别人的 */
            background-color: #4CAF50;
        }
        
        .stone.stone-1 { background-color: #f44336; }
        .stone.stone-2 { background-color: #e91e63; }
        .stone.stone-3 { background-color: #9c27b0; }
        .stone.stone-4 { background-color: #673ab7; }
        .stone.stone-5 { background-color: #3f51b5; }
        .stone.stone-6 { background-color: #2196f3; }
        .stone.stone-7 { background-color: #009688; }
        .stone.stone-8 { background-color: #4CAF50; }
        
        .action-area {
            background-color: #f8f0e3;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .action-area button {
            padding: 10px 25px;
            font-size: 16px;
            margin: 5px;
            border-radius: 5px;
            border: none;
            background-color: #8b5a2b;
            color: white;
            cursor: pointer;
        }
        
        .action-area button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        .action-area button:hover:not(:disabled) {
            background-color: #a06c3b;
        }
        
        .log-area {
            margin-top: 20px;
            height: 150px;
            background-color: #f8f0e3;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-size: 14px;
        }
        
        .victory-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .victory-content {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            color: #8b5a2b;
        }
        
        .victory-content button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            background-color: #8b5a2b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏设置界面 -->
        <div class="setup-screen active" id="setupScreen">
            <h1>出包魔法师 (Abraca What)</h1>
            <div class="player-setup">
                <label for="playerCount">选择玩家人数 (3-6):</label>
                <select id="playerCount">
                    <option value="3">3人</option>
                    <option value="4">4人</option>
                    <option value="5">5人</option>
                    <option value="6">6人</option>
                </select>
                <button onclick="startGame()">开始游戏</button>
            </div>
        </div>

        <!-- 游戏主界面 -->
        <div class="game-screen" id="gameScreen">
            <div class="game-status" id="gameStatus">
                游戏开始！请等待玩家准备...
            </div>

            <div class="players-area" id="playersArea">
                <!-- 玩家卡片会动态生成 -->
            </div>

            <div class="action-area">
                <h3>当前玩家操作区</h3>
                <div id="actionButtons">
                    <p>请选择要喊出的魔法石数字:</p>
                    <div id="numberButtons">
                        <button onclick="castSpell(1)" disabled>1</button>
                        <button onclick="castSpell(2)" disabled>2</button>
                        <button onclick="castSpell(3)" disabled>3</button>
                        <button onclick="castSpell(4)" disabled>4</button>
                        <button onclick="castSpell(5)" disabled>5</button>
                        <button onclick="castSpell(6)" disabled>6</button>
                        <button onclick="castSpell(7)" disabled>7</button>
                        <button onclick="castSpell(8)" disabled>8</button>
                    </div>
                    <br>
                    <button onclick="stopCasting()" disabled id="stopButton">停止施法 (进入补牌)</button>
                </div>
            </div>

            <div class="log-area" id="gameLog">
                游戏日志：<br>
            </div>
        </div>
    </div>

    <!-- 胜利弹窗 -->
    <div class="victory-modal" id="victoryModal">
        <div class="victory-content">
            <h2 id="victoryText">恭喜！玩家X获得胜利！</h2>
            <button onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        // 游戏全局数据
        let gameData = {
            playerCount: 3,
            players: [],
            currentPlayerIndex: 0,
            centralStones: [], // 中央牌堆
            usedStones: [], // 已使用的魔法石
            gameLog: [],
            currentCombo: [], // 当前连击的数字
            gameRunning: false
        };

        // 初始化魔法石（1-8，数量分别为1/2/3/4/5/6/7/8）
        function initMagicStones() {
            let stones = [];
            for (let i = 1; i <= 8; i++) {
                for (let j = 0; j < i; j++) {
                    stones.push(i);
                }
            }
            // 洗牌
            return stones.sort(() => Math.random() - 0.5);
        }

        // 开始游戏
        function startGame() {
            gameData.playerCount = parseInt(document.getElementById("playerCount").value);
            gameData.gameRunning = true;
            
            // 初始化魔法石
            let allStones = initMagicStones();
            
            // 创建玩家
            gameData.players = [];
            for (let i = 0; i < gameData.playerCount; i++) {
                // 每个玩家发5张牌
                let playerStones = allStones.splice(0, 5);
                gameData.players.push({
                    id: i + 1,
                    name: `玩家${i + 1}`,
                    stones: playerStones,
                    life: 3,
                    level: 1,
                    isDead: false
                });
            }
            
            // 剩余的作为中央牌堆
            gameData.centralStones = allStones;
            gameData.usedStones = [];
            
            // 切换到游戏界面
            document.getElementById("setupScreen").classList.remove("active");
            document.getElementById("gameScreen").classList.add("active");
            
            // 渲染玩家界面
            renderPlayers();
            updateGameStatus();
            updateGameLog("游戏开始！所有玩家已分配魔法石，当前是玩家1的回合");
            
            // 开始第一个玩家的回合
            startPlayerTurn(0);
        }

        // 渲染玩家卡片
        function renderPlayers() {
            const playersArea = document.getElementById("playersArea");
            playersArea.innerHTML = "";
            
            gameData.players.forEach((player, index) => {
                const isCurrentPlayer = index === gameData.currentPlayerIndex;
                
                // 创建玩家卡片
                let playerCard = document.createElement("div");
                playerCard.className = `player-card ${isCurrentPlayer ? "current-turn" : ""}`;
                
                // 玩家信息
                let statsHTML = `
                    <div class="player-stats">
                        ${player.name} (${isCurrentPlayer ? "当前回合" : ""})<br>
                        生命值: ${player.life} | 层数: ${player.level}
                        ${player.isDead ? "<br><span style='color:red'>已阵亡</span>" : ""}
                    </div>
                `;
                
                // 魔法石（自己的牌背面，别人的牌正面）
                let stonesHTML = "<div class='magic-stones'>";
                player.stones.forEach(stone => {
                    stonesHTML += `<div class="stone ${isCurrentPlayer ? "own" : "other stone-" + stone}">
                        ${isCurrentPlayer ? "" : stone}
                    </div>`;
                });
                stonesHTML += "</div>";
                
                playerCard.innerHTML = statsHTML + stonesHTML;
                playersArea.appendChild(playerCard);
            });
            
            // 更新操作按钮状态
            updateActionButtons();
        }

        // 更新游戏状态提示
        function updateGameStatus() {
            const currentPlayer = gameData.players[gameData.currentPlayerIndex];
            let statusText = `当前回合：${currentPlayer.name} | 中央牌堆剩余：${gameData.centralStones.length}块 | 连击数字：${gameData.currentCombo.join(", ") || "无"}`;
            
            if (currentPlayer.isDead) {
                statusText += " | 该玩家已阵亡，自动跳过回合";
            }
            
            document.getElementById("gameStatus").textContent = statusText;
        }

        // 更新游戏日志
        function updateGameLog(message) {
            const logArea = document.getElementById("gameLog");
            gameData.gameLog.push(message);
            logArea.innerHTML = "游戏日志：<br>" + gameData.gameLog.join("<br>");
            logArea.scrollTop = logArea.scrollHeight; // 滚动到最新日志
        }

        // 开始玩家回合
        function startPlayerTurn(playerIndex) {
            const player = gameData.players[playerIndex];
            
            // 如果玩家已阵亡，直接跳过
            if (player.isDead) {
                updateGameLog(`${player.name}已阵亡，跳过回合`);
                nextPlayerTurn();
                return;
            }
            
            gameData.currentCombo = [];
            gameData.currentPlayerIndex = playerIndex;
            
            // 更新界面
            renderPlayers();
            updateGameStatus();
            updateGameLog(`${player.name}的回合开始！请选择要喊出的魔法石数字`);
            
            // 启用数字按钮
            enableNumberButtons(1);
        }

        // 更新操作按钮状态
        function updateActionButtons() {
            const numberButtons = document.querySelectorAll("#numberButtons button");
            const stopButton = document.getElementById("stopButton");
            
            // 默认禁用所有按钮
            numberButtons.forEach(btn => btn.disabled = true);
            stopButton.disabled = true;
            
            const currentPlayer = gameData.players[gameData.currentPlayerIndex];
            if (currentPlayer.isDead || !gameData.gameRunning) return;
            
            // 如果有连击，只启用≥最后一个数字的按钮
            if (gameData.currentCombo.length > 0) {
                const lastNumber = gameData.currentCombo[gameData.currentCombo.length - 1];
                numberButtons.forEach(btn => {
                    const num = parseInt(btn.textContent);
                    if (num >= lastNumber && !gameData.currentCombo.includes(num)) {
                        btn.disabled = false;
                    }
                });
            } else {
                // 首次施法，启用所有数字
                numberButtons.forEach(btn => btn.disabled = false);
            }
            
            // 有连击时启用停止按钮
            stopButton.disabled = gameData.currentCombo.length === 0;
        }

        // 启用指定最小值以上的数字按钮
        function enableNumberButtons(minNumber) {
            const numberButtons = document.querySelectorAll("#numberButtons button");
            numberButtons.forEach(btn => {
                const num = parseInt(btn.textContent);
                btn.disabled = num < minNumber || gameData.currentCombo.includes(num);
            });
            document.getElementById("stopButton").disabled = false;
        }

        // 施法（喊数字）
        function castSpell(number) {
            const currentPlayer = gameData.players[gameData.currentPlayerIndex];
            
            // 检查是否有该数字
            const hasStone = currentPlayer.stones.includes(number);
            
            if (hasStone) {
                // 施法成功
                gameData.currentCombo.push(number);
                updateGameLog(`${currentPlayer.name}喊出数字${number}，施法成功！`);
                
                // 移除该魔法石并加入已使用堆
                const stoneIndex = currentPlayer.stones.indexOf(number);
                gameData.usedStones.push(currentPlayer.stones.splice(stoneIndex, 1)[0]);
                
                // 执行魔法效果
                executeMagicEffect(number);
                
                // 检查连击次数（最多5次）
                if (gameData.currentCombo.length >= 5) {
                    updateGameLog(`${currentPlayer.name}已连击5次，强制结束施法阶段`);
                    endCastingPhase();
                    return;
                }
                
                // 更新界面
                renderPlayers();
                updateGameStatus();
                updateGameLog(`可以继续连击（需≥${number}），或点击停止施法`);
                
                // 更新按钮（只能选≥当前数字的）
                enableNumberButtons(number);
                
            } else {
                // 施法失败（出包）
                updateGameLog(`${currentPlayer.name}喊出数字${number}，施法失败！扣1点生命值`);
                
                // 扣血
                currentPlayer.life -= 1;
                updateGameLog(`${currentPlayer.name}生命值变为${currentPlayer.life}`);
                
                // 检查是否阵亡
                if (currentPlayer.life <= 0) {
                    currentPlayer.isDead = true;
                    updateGameLog(`${currentPlayer.name}生命值归零，已阵亡！其他玩家各+1层`);
                    
                    // 其他玩家加层数
                    gameData.players.forEach(player => {
                        if (!player.isDead && player.id !== currentPlayer.id) {
                            player.level += 1;
                            updateGameLog(`${player.name}层数+1，当前层数：${player.level}`);
                        }
                    });
                }
                
                // 结束当前回合（失败强制结束）
                endCastingPhase();
            }
            
            // 检查胜利条件
            checkVictory();
        }

        // 执行魔法效果
        function executeMagicEffect(number) {
            const currentPlayer = gameData.players[gameData.currentPlayerIndex];
            let effectLog = `${currentPlayer.name}触发数字${number}的魔法效果：`;
            
            switch(number) {
                case 1: // 古代巨龙：掷骰，其他玩家扣对应点数生命
                    const dice1 = Math.floor(Math.random() * 6) + 1;
                    effectLog += `掷出${dice1}点，所有其他玩家扣${dice1}点生命`;
                    gameData.players.forEach(player => {
                        if (player.id !== currentPlayer.id && !player.isDead) {
                            player.life -= dice1;
                            if (player.life <= 0) {
                                player.isDead = true;
                                effectLog += ` | ${player.name}生命值归零，已阵亡`;
                            }
                        }
                    });
                    break;
                    
                case 2: // 黑暗幽灵：其他玩家-1生命，自己+1生命
                    effectLog += "所有其他玩家扣1点生命，自己加1点生命";
                    currentPlayer.life += 1;
                    gameData.players.forEach(player => {
                        if (player.id !== currentPlayer.id && !player.isDead) {
                            player.life -= 1;
                            if (player.life <= 0) {
                                player.isDead = true;
                                effectLog += ` | ${player.name}生命值归零，已阵亡`;
                            }
                        }
                    });
                    break;
                    
                case 3: // 甜蜜的梦：掷骰，自己恢复对应点数生命
                    const dice3 = Math.floor(Math.random() * 6) + 1;
                    currentPlayer.life += dice3;
                    effectLog += `掷出${dice3}点，自己恢复${dice3}点生命（当前生命值：${currentPlayer.life}）`;
                    break;
                    
                case 4: // 猫头鹰：查看1块中央牌并加入自己手牌
                    if (gameData.centralStones.length > 0) {
                        const stone = gameData.centralStones.splice(Math.floor(Math.random() * gameData.centralStones.length), 1)[0];
                        currentPlayer.stones.push(stone);
                        effectLog += `查看并获得中央牌堆的${stone}号魔法石`;
                    } else {
                        effectLog += "中央牌堆已空，无法获取魔法石";
                    }
                    break;
                    
                case 5: // 闪电暴风雨：左右相邻玩家-1生命
                    effectLog += "左右相邻玩家各扣1点生命";
                    const leftIndex = (gameData.currentPlayerIndex - 1 + gameData.playerCount) % gameData.playerCount;
                    const rightIndex = (gameData.currentPlayerIndex + 1) % gameData.playerCount;
                    
                    [leftIndex, rightIndex].forEach(index => {
                        const player = gameData.players[index];
                        if (!player.isDead) {
                            player.life -= 1;
                            if (player.life <= 0) {
                                player.isDead = true;
                                effectLog += ` | ${player.name}生命值归零，已阵亡`;
                            }
                        }
                    });
                    break;
                    
                case 6: // 暴风雪：左边玩家-1生命
                    effectLog += "左边相邻玩家扣1点生命";
                    const leftPlayerIndex = (gameData.currentPlayerIndex - 1 + gameData.playerCount) % gameData.playerCount;
                    const leftPlayer = gameData.players[leftPlayerIndex];
                    if (!leftPlayer.isDead) {
                        leftPlayer.life -= 1;
                        if (leftPlayer.life <= 0) {
                            leftPlayer.isDead = true;
                            effectLog += ` | ${leftPlayer.name}生命值归零，已阵亡`;
                        }
                    }
                    break;
                    
                case 7: // 火球术：右边玩家-1生命
                    effectLog += "右边相邻玩家扣1点生命";
                    const rightPlayerIndex = (gameData.currentPlayerIndex + 1) % gameData.playerCount;
                    const rightPlayer = gameData.players[rightPlayerIndex];
                    if (!rightPlayer.isDead) {
                        rightPlayer.life -= 1;
                        if (rightPlayer.life <= 0) {
                            rightPlayer.isDead = true;
                            effectLog += ` | ${rightPlayer.name}生命值归零，已阵亡`;
                        }
                    }
                    break;
                    
                case 8: // 魔法药水：自己+1生命
                    currentPlayer.life += 1;
                    effectLog += `自己恢复1点生命（当前生命值：${currentPlayer.life}）`;
                    break;
            }
            
            updateGameLog(effectLog);
        }

        // 停止施法（主动结束）
        function stopCasting() {
            updateGameLog(`${gameData.players[gameData.currentPlayerIndex].name}选择停止施法`);
            endCastingPhase();
        }

        // 结束施法阶段（进入补牌）
        function endCastingPhase() {
            const currentPlayer = gameData.players[gameData.currentPlayerIndex];
            updateGameLog(`${currentPlayer.name}的施法阶段结束，开始补牌`);
            
            // 补牌到5张（如果中央牌堆有牌）
            const needCards = 5 - currentPlayer.stones.length;
            if (needCards > 0 && gameData.centralStones.length > 0) {
                const takeCount = Math.min(needCards, gameData.centralStones.length);
                const newStones = gameData.centralStones.splice(0, takeCount);
                currentPlayer.stones = [...currentPlayer.stones, ...newStones];
                updateGameLog(`${currentPlayer.name}补了${takeCount}块魔法石，当前手牌：${currentPlayer.stones.length}块`);
                
                // 检查是否用光中央牌堆且自己手牌为空
                if (gameData.centralStones.length === 0 && currentPlayer.stones.length === 0) {
                    updateGameLog(`${currentPlayer.name}用光了所有魔法石且中央牌堆已空！层数+3`);
                    currentPlayer.level += 3;
                }
            } else {
                updateGameLog(`${currentPlayer.name}无需补牌或中央牌堆已空`);
            }
            
            // 检查胜利条件
            if (checkVictory()) return;
            
            // 进入下一个玩家回合
            nextPlayerTurn();
        }

        // 下一个玩家回合
        function nextPlayerTurn() {
            let nextIndex = (gameData.currentPlayerIndex + 1) % gameData.playerCount;
            
            // 跳过已阵亡的玩家
            let deadCount = 0;
            while (gameData.players[nextIndex].isDead && deadCount < gameData.playerCount) {
                nextIndex = (nextIndex + 1) % gameData.playerCount;
                deadCount++;
            }
            
            // 如果所有玩家都阵亡（理论上不可能）
            if (deadCount >= gameData.playerCount) {
                updateGameLog("所有玩家都已阵亡，游戏结束");
                gameData.gameRunning = false;
                return;
            }
            
            // 开始下一个玩家回合
            startPlayerTurn(nextIndex);
        }

        // 检查胜利条件
        function checkVictory() {
            // 检查是否有玩家到达8层
            const winner = gameData.players.find(player => player.level >= 8 && !player.isDead);
            
            if (winner) {
                updateGameLog(`🎉 ${winner.name}到达第8层，获得胜利！`);
                showVictoryModal(winner.name);
                gameData.gameRunning = false;
                return true;
            }
            
            // 检查是否有玩家用光所有手牌且中央牌堆为空
            const emptyHandWinner = gameData.players.find(player => 
                !player.isDead && player.stones.length === 0 && gameData.centralStones.length === 0
            );
            
            if (emptyHandWinner) {
                updateGameLog(`🎉 ${emptyHandWinner.name}用光所有魔法石且中央牌堆已空，层数+3后获胜！`);
                showVictoryModal(emptyHandWinner.name);
                gameData.gameRunning = false;
                return true;
            }
            
            return false;
        }

        // 显示胜利弹窗
        function showVictoryModal(winnerName) {
            document.getElementById("victoryText").textContent = `恭喜！${winnerName}获得胜利！`;
            document.getElementById("victoryModal").style.display = "flex";
        }

        // 重新开始游戏
        function restartGame() {
            document.getElementById("victoryModal").style.display = "none";
            gameData = {
                playerCount: 3,
                players: [],
                currentPlayerIndex: 0,
                centralStones: [],
                usedStones: [],
                gameLog: [],
                currentCombo: [],
                gameRunning: false
            };
            
            // 回到设置界面
            document.getElementById("gameScreen").classList.remove("active");
            document.getElementById("setupScreen").classList.add("active");
            document.getElementById("gameLog").innerHTML = "游戏日志：<br>";
        }

        // 启用数字按钮（根据连击规则）
        function enableNumberButtons(minNum) {
            const buttons = document.querySelectorAll("#numberButtons button");
            buttons.forEach(btn => {
                const num = parseInt(btn.textContent);
                btn.disabled = (num < minNum) || gameData.currentCombo.includes(num) || 
                               gameData.players[gameData.currentPlayerIndex].isDead;
            });
            document.getElementById("stopButton").disabled = gameData.currentCombo.length === 0;
        }

        // 更新操作按钮状态
        function updateActionButtons() {
            const minNum = gameData.currentCombo.length > 0 ? gameData.currentCombo[gameData.currentCombo.length - 1] : 1;
            enableNumberButtons(minNum);
        }
    </script>
</body>
</html>
