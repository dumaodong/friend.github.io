<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4人联机猜牌游戏</title>
<style>
  body{font-family:Arial;background:#f6f6f6;padding:20px;max-width:1000px;margin:auto}
  .panel{background:white;border-radius:10px;padding:15px;margin:10px 0;box-shadow:0 0 5px #00000010}
  button{padding:10px 16px;background:#2ecc71;color:white;border:none;border-radius:6px;margin:5px;cursor:pointer}
  button:disabled{background:#ccc}
  input{padding:8px;width:100px;margin:5px}
  .my-card{width:50px;height:70px;background:#2ecc71;border:2px solid #27ae60;display:inline-flex;align-items:center;justify-content:center;font-size:20px;margin:3px;border-radius:6px;color:white}
  .player-card{width:50px;height:70px;background:white;border:2px solid #2ecc71;display:inline-flex;align-items:center;justify-content:center;font-size:20px;margin:3px;border-radius:6px}
  .status-text{color:#ff6700;font-weight:bold;margin:10px 0}
  .player-area{margin:10px 0;padding:10px;border:1px solid #eee;border-radius:5px}
</style>
</head>
<body>
<h1>4人联机猜牌游戏</h1>

<div class="panel">
  <input type="text" id="roomId" placeholder="房间ID（4人一致）" value="room123">
  <input type="text" id="playerId" placeholder="你的昵称（比如玩家1）" value="玩家1">
  <button onclick="connectRoom()">进入房间</button>
  <div class="status-text" id="status">未连接</div>
</div>

<div class="player-area">
  <h3>我的手牌（背面）：<span id="myHandCount">0</span>张</h3>
  <div id="myHand"></div>
</div>

<div class="player-area">
  <h3>其他玩家手牌：</h3>
  <div>玩家2：<div id="player2Hand"></div></div>
  <div>玩家3：<div id="player3Hand"></div></div>
  <div>玩家4：<div id="player4Hand"></div></div>
</div>

<div class="panel">
  猜数字：<select id="cardNum">
    <option>1</option><option>2</option><option>3</option><option>4</option>
    <option>5</option><option>6</option><option>7</option><option>8</option>
  </select>
  张数：<input type="number" id="cardCount" value="1" min="1" max="8">
  <button onclick="playCard()">出牌</button>
  <button onclick="endTurn()">结束回合</button>
  <div>已打出的牌：<div id="playedCards"></div></div>
</div>

<script>
  // 全局变量
  let ws = null;
  let roomId = "";
  let playerId = "";
  let myHand = []; // 自己的手牌（后台记录）
  let playerHands = { // 其他玩家的手牌
    "玩家2": [],
    "玩家3": [],
    "玩家4": []
  };
  let playedCards = [];
  let deck = []; // 公共牌库

  // 初始化36张牌库
  function initDeck() {
    deck = [];
    for(let n=1;n<=8;n++){
      for(let i=0;i<n;i++) deck.push(n);
    }
    // 洗牌
    deck = deck.sort(() => Math.random() - 0.5);
  }

  // 连接房间（核心：通过公共WebSocket服务器同步数据）
  function connectRoom() {
    roomId = document.getElementById('roomId').value.trim();
    playerId = document.getElementById('playerId').value.trim();
    
    if(!roomId || !playerId) {
      alert("请输入房间ID和你的昵称！");
      return;
    }

    // 关闭旧连接
    if(ws) ws.close();

    // 连接国内可用的公共WebSocket服务器（核心：不用自己搭服务器）
    ws = new WebSocket('wss://ws.ifelse.io/');

    // 连接成功
    ws.onopen = function() {
      document.getElementById('status').textContent = `已连接房间：${roomId}（${playerId}）`;
      // 初始化自己的手牌（5张）
      initDeck();
      myHand = deck.splice(0,5);
      updateMyHand();
      // 通知其他玩家自己已加入
      sendMessage({
        type: "join",
        roomId: roomId,
        playerId: playerId,
        handCount: myHand.length
      });
    };

    // 接收其他玩家的消息（核心：同步4人数据）
    ws.onmessage = function(e) {
      let data;
      try {
        data = JSON.parse(e.data);
      } catch (err) {
        console.log("非JSON数据：", e.data);
        return;
      }

      // 只处理当前房间的消息（避免串房）
      if(data.roomId !== roomId) return;

      // 处理玩家加入
      if(data.type === "join") {
        if(data.playerId !== playerId && playerHands[data.playerId]) {
          playerHands[data.playerId] = Array(data.handCount).fill(0); // 暂存数量
          updatePlayerHands();
          document.getElementById('status').textContent = `${data.playerId}已加入房间！`;
        }
      }

      // 处理出牌同步
      if(data.type === "play") {
        if(data.playerId !== playerId) {
          playedCards.push({num: data.cardNum, count: data.cardCount, player: data.playerId});
          // 减少对应玩家的手牌
          if(playerHands[data.playerId]) {
            playerHands[data.playerId] = playerHands[data.playerId].slice(data.cardCount);
          }
          updatePlayerHands();
          updatePlayedCards();
          document.getElementById('status').textContent = `${data.playerId}打出了${data.cardCount}张${data.cardNum}！`;
        }
      }

      // 处理回合结束（补牌）
      if(data.type === "endTurn") {
        if(data.playerId !== playerId) {
          // 给对应玩家补牌到5张
          if(playerHands[data.playerId]) {
            const need = 5 - playerHands[data.playerId].length;
            playerHands[data.playerId] = playerHands[data.playerId].concat(Array(need).fill(0));
          }
          updatePlayerHands();
          document.getElementById('status').textContent = `${data.playerId}结束回合，已补牌！`;
        }
      }
    };

    // 连接失败/关闭
    ws.onerror = function() {
      document.getElementById('status').textContent = "连接失败！请刷新重试";
    };
    ws.onclose = function() {
      document.getElementById('status').textContent = "连接已断开！";
    };
  }

  // 发送消息到公共服务器（转发给其他玩家）
  function sendMessage(msg) {
    if(ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    } else {
      alert("还没连接到房间！");
    }
  }

  // 出牌逻辑
  function playCard() {
    const cardNum = parseInt(document.getElementById('cardNum').value);
    const cardCount = parseInt(document.getElementById('cardCount').value);
    const count = myHand.filter(x => x === cardNum).length;

    if(count < cardCount) {
      alert(`你没有${cardCount}张${cardNum}！`);
      return;
    }

    // 本地减少手牌
    myHand = myHand.filter(x => x !== cardNum).concat(myHand.filter(x => x === cardNum).slice(cardCount));
    updateMyHand();
    // 记录出牌
    playedCards.push({num: cardNum, count: cardCount, player: playerId});
    updatePlayedCards();
    // 通知其他玩家
    sendMessage({
      type: "play",
      roomId: roomId,
      playerId: playerId,
      cardNum: cardNum,
      cardCount: cardCount
    });
    document.getElementById('status').textContent = `你打出了${cardCount}张${cardNum}！`;
  }

  // 结束回合（补牌）
  function endTurn() {
    // 本地补牌到5张
    const need = 5 - myHand.length;
    if(need > 0 && deck.length > 0) {
      myHand = myHand.concat(deck.splice(0, need));
    }
    updateMyHand();
    // 通知其他玩家
    sendMessage({
      type: "endTurn",
      roomId: roomId,
      playerId: playerId
    });
    document.getElementById('status').textContent = `你结束回合，已补牌！当前手牌${myHand.length}张`;
  }

  // 更新自己的手牌显示（背面）
  function updateMyHand() {
    const el = document.getElementById('myHand');
    el.innerHTML = "";
    myHand.forEach(() => {
      el.innerHTML += `<div class='my-card'>背</div>`;
    });
    document.getElementById('myHandCount').textContent = myHand.length;
    if(myHand.length === 0) el.innerHTML = "无手牌";
  }

  // 更新其他玩家的手牌显示
  function updatePlayerHands() {
    for(let p in playerHands) {
      const el = document.getElementById(`${p.replace('玩家', 'player')}Hand`);
      el.innerHTML = "";
      playerHands[p].forEach(() => {
        el.innerHTML += `<div class='player-card'>?</div>`;
      });
      if(playerHands[p].length === 0) el.innerHTML = "无手牌";
    }
  }

  // 更新已打出的牌
  function updatePlayedCards() {
    const el = document.getElementById('playedCards');
    el.innerHTML = "";
    playedCards.forEach(item => {
      el.innerHTML += `<span>${item.player}：${item.count}张${item.num} </span>`;
    });
    if(playedCards.length === 0) el.innerHTML = "无";
  }
</script>
</body>
</html>
