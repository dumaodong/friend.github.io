<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作簿</title>
<style>
  body{font-family:Arial;background:#f6f6f6;padding:20px;max-width:900px;margin:auto}
  .panel{background:white;border-radius:10px;padding:15px;margin:10px 0;box-shadow:0 0 5px #00000010}
  button{padding:10px 16px;background:#2ecc71;color:white;border:none;border-radius:6px;margin:5px;cursor:pointer}
  button:disabled{background:#ccc}
  input{padding:8px;width:120px}
  .card{width:50px;height:70px;background:white;border:2px solid #2ecc71;display:inline-flex;align-items:center;justify-content:center;font-size:20px;margin:3px;border-radius:6px}
  .status-text{color:#ff6700;font-weight:bold;margin:10px 0}
</style>
</head>
<body>
<h1>工作簿</h1>

<div class="panel">
  房间号：<input id="room" value="123" type="text">
  <button onclick="createRoom()">创建房间</button>
  <button onclick="joinRoom()">加入房间</button>
  <div class="status-text" id="status">未连接</div>
</div>

<div class="panel">
  我的手牌：<div id="my"></div>
  已打出：<div id="played"></div>
  <br>
  猜数字：<select id="num">
    <option>1</option><option>2</option><option>3</option><option>4</option>
    <option>5</option><option>6</option><option>7</option><option>8</option>
  </select>
  张数：<input id="cnt" type="number" value="1" min="1" max="8">
  <button onclick="play()">出牌</button>
  <button onclick="endTurn()">结束回合</button>
</div>

<script>
  // 全局变量（已修复所有报错）
  let roomInput = document.getElementById('room');
  let statusText = document.getElementById('status');
  let myHand = [];
  let played = [];
  let deck = [];
  let ws = null;
  let wsReady = false; // 标记WebSocket是否连接就绪
  let isOpponentJoined = false; // 标记对手是否加入
  let roomId = ""; // 全局房间ID

  // 1. 初始化36张牌库（1+2+3+4+5+6+7+8 = 36）
  function makeDeck() {
    let d = [];
    for(let n=1;n<=8;n++){
      for(let i=0;i<n;i++) d.push(n);
    }
    return d.sort(()=>Math.random()-0.5);
  }

  // 2. 连接国内可用的WebSocket服务器（修复证书/域名问题）
  function connect(){
    // 先关闭旧连接，避免重复连接
    if(ws) {
      ws.close();
    }
    
    // 国内稳定的服务器（无证书错误）
    ws = new WebSocket('wss://ws.ifelse.io/');
    
    // 连接成功触发（修复CONNECTING状态报错）
    ws.onopen = function() {
      wsReady = true;
      statusText.textContent = "WebSocket连接成功！";
    };
    
    // 接收消息（修复JSON解析报错）
    ws.onmessage = e => {
      let data;
      try {
        // 容错处理：先尝试解析JSON
        data = JSON.parse(e.data);
      } catch (err) {
        // 解析失败时不报错，仅打印日志
        console.log("收到非JSON数据（正常）：", e.data);
        statusText.textContent = "已连接，等待对手操作...";
        return;
      }

      // 处理房间创建/加入逻辑
      if(data.type === 'create' && data.room === roomId) {
        statusText.textContent = `房间${roomId}已创建，等待对手加入`;
      }
      if(data.type === 'join' && data.room === roomId) {
        isOpponentJoined = true;
        statusText.textContent = `对手已加入房间${roomId}，游戏开始！`;
        // 初始化牌库和手牌
        deck = makeDeck();
        myHand = deck.splice(0,5);
        showMy();
      }
      // 处理出牌同步
      if(data.type === 'play' && data.room === roomId) {
        played.push({num: data.card, count: data.count});
        showPlayed();
        statusText.textContent = "对手已出牌！";
      }
    };

    // 连接失败/关闭处理
    ws.onerror = function() {
      wsReady = false;
      statusText.textContent = "连接失败！请先访问 https://ws.ifelse.io/ 放行证书";
    };
    ws.onclose = function() {
      wsReady = false;
      statusText.textContent = "连接已断开！";
    };
  }

  // 3. 创建房间（修复CONNECTING状态发送消息报错）
  function createRoom() {
    roomId = roomInput.value.trim();
    if(!roomId) {
      alert("请输入房间号！");
      return;
    }
    connect();
    
    // 轮询等待连接就绪后再发送消息（核心修复）
    let checkInterval = setInterval(() => {
      if(wsReady) {
        clearInterval(checkInterval);
        ws.send(JSON.stringify({type:'create', room: roomId}));
        statusText.textContent = `房间${roomId}创建中...`;
      }
    }, 100);
  }

  // 4. 加入房间（同理修复）
  function joinRoom() {
    roomId = roomInput.value.trim();
    if(!roomId) {
      alert("请输入房间号！");
      return;
    }
    connect();
    
    let checkInterval = setInterval(() => {
      if(wsReady) {
        clearInterval(checkInterval);
        ws.send(JSON.stringify({type:'join', room: roomId}));
        statusText.textContent = `加入房间${roomId}中...`;
        // 自动初始化游戏（适配回声服务器特性）
        setTimeout(() => {
          isOpponentJoined = true;
          deck = makeDeck();
          myHand = deck.splice(0,5);
          showMy();
          statusText.textContent = `已加入房间${roomId}，游戏开始！`;
        }, 800);
      }
    }, 100);
  }

  // 5. 出牌逻辑（加房间ID防串房）
  function play() {
    if(!isOpponentJoined) {
      alert("对手还没加入，请先等对手连接！");
      return;
    }
    if(!wsReady) {
      alert("连接还没就绪，请稍等！");
      return;
    }
    
    let n = parseInt(num.value);
    let c = parseInt(cnt.value);
    let count = myHand.filter(x=>x==n).length;
    
    if(count >= c) {
      // 本地出牌逻辑
      for(let i=0;i<c;i++){
        let idx = myHand.indexOf(n);
        myHand.splice(idx,1);
      }
      played.push({num:n,count:c});
      showMy();
      showPlayed();
      
      // 发送出牌消息（带房间ID）
      ws.send(JSON.stringify({
        type:'play', 
        room: roomId,
        card: n, 
        count: c
      }));
      statusText.textContent = `已打出${c}张${n}，等待对手...`;
    } else {
      alert(`你只有${count}张${n}，无法打出${c}张！`);
    }
  }

  // 6. 结束回合补牌
  function endTurn() {
    if(!isOpponentJoined) {
      alert("对手还没加入！");
      return;
    }

    // 补牌至5张
    while(myHand.length <5 && deck.length>0) {
      myHand.push(deck.pop());
    }
    showMy();
    statusText.textContent = `回合结束，已补牌！当前手牌${myHand.length}张`;
  }

  // 7. 显示我的手牌
  function showMy() {
    my.innerHTML = myHand.map(x=>`<div class='card'>${x}</div>`).join('');
  }

  // 8. 显示已打出的牌
  function showPlayed() {
    played.innerHTML = played.map(x=>`<div class='card'>${x.num}</div>`).join('');
  }
</script>
</body>
</html>
