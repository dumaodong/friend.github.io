<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作簿</title>
<style>
  body{font-family:Arial;background:#f6f6f6;padding:20px;max-width:900px;margin:auto}
  .panel{background:white;border-radius:10px;padding:15px;margin:10px 0;box-shadow:0 0 5px #00000010}
  button{padding:10px 16px;background:#2ecc71;color:white;border:none;border-radius:6px;margin:5px;cursor:pointer}
  button:disabled{background:#ccc}
  input{padding:8px;width:120px}
  /* 自己的手牌（背面样式） */
  .my-card{width:50px;height:70px;background:#2ecc71;border:2px solid #27ae60;display:inline-flex;align-items:center;justify-content:center;font-size:20px;margin:3px;border-radius:6px;color:white;font-weight:bold}
  /* 对手的手牌（正常显示） */
  .opponent-card{width:50px;height:70px;background:white;border:2px solid #2ecc71;display:inline-flex;align-items:center;justify-content:center;font-size:20px;margin:3px;border-radius:6px}
  .status-text{color:#ff6700;font-weight:bold;margin:10px 0}
</style>
</head>
<body>
<h1>工作簿</h1>

<div class="panel">
  房间号：<input id="room" value="123" type="text">
  <button onclick="createRoom()">创建房间</button>
  <button onclick="joinRoom()">加入房间</button>
  <div class="status-text" id="status">未连接</div>
</div>

<div class="panel">
  <!-- 自己的手牌（显示背面） -->
  我的手牌（背面）：<div id="my"></div>
  <!-- 对手的手牌（显示真实数字） -->
  对手的手牌：<div id="opponent"></div>
  已打出：<div id="played"></div>
  <br>
  猜数字：<select id="num">
    <option>1</option><option>2</option><option>3</option><option>4</option>
    <option>5</option><option>6</option><option>7</option><option>8</option>
  </select>
  张数：<input id="cnt" type="number" value="1" min="1" max="8">
  <button onclick="play()">出牌</button>
  <button onclick="endTurn()">结束回合</button>
</div>

<script>
  // 全局变量
  let roomInput = document.getElementById('room');
  let statusText = document.getElementById('status');
  let myHand = []; // 自己的手牌（后台记录，不显示数字）
  let opponentHand = []; // 对手的手牌（显示真实数字）
  let played = [];
  let deck = [];
  let ws = null;
  let wsReady = false;
  let isOpponentJoined = false;
  let roomId = "";

  // 初始化36张牌库
  function makeDeck() {
    let d = [];
    for(let n=1;n<=8;n++){
      for(let i=0;i<n;i++) d.push(n);
    }
    return d.sort(()=>Math.random()-0.5);
  }

  // 连接WebSocket服务器
  function connect(){
    if(ws) {
      ws.close();
    }
    ws = new WebSocket('wss://ws.ifelse.io/');
    
    ws.onopen = function() {
      wsReady = true;
      statusText.textContent = "WebSocket连接成功！";
    };
    
    ws.onmessage = e => {
      let data;
      try {
        data = JSON.parse(e.data);
      } catch (err) {
        console.log("收到非JSON数据：", e.data);
        statusText.textContent = "已连接，等待对手操作...";
        return;
      }

      // 处理房间创建/加入
      if(data.type === 'create' && data.room === roomId) {
        statusText.textContent = `房间${roomId}已创建，等待对手加入`;
      }
      if(data.type === 'join' && data.room === roomId) {
        isOpponentJoined = true;
        // 初始化自己的手牌（后台记录）+ 对手的手牌（显示）
        deck = makeDeck();
        myHand = deck.splice(0,5);
        opponentHand = deck.splice(0,5); // 对手手牌随机生成（联机时可同步）
        showMyHand(); // 显示自己的手牌背面
        showOpponentHand(); // 显示对手的真实手牌
        statusText.textContent = `对手已加入房间${roomId}，游戏开始！`;
      }
      // 处理出牌同步（对手出牌后更新显示）
      if(data.type === 'play' && data.room === roomId) {
        played.push({num: data.card, count: data.count});
        showPlayed();
        // 对手出牌后减少其手牌
        for(let i=0;i<data.count;i++){
          let idx = opponentHand.indexOf(data.card);
          opponentHand.splice(idx,1);
        }
        showOpponentHand();
        statusText.textContent = "对手已出牌！";
      }
    };

    ws.onerror = function() {
      wsReady = false;
      statusText.textContent = "连接失败！请先访问 https://ws.ifelse.io/ 放行证书";
    };
    ws.onclose = function() {
      wsReady = false;
      statusText.textContent = "连接已断开！";
    };
  }

  // 创建房间
  function createRoom() {
    roomId = roomInput.value.trim();
    if(!roomId) {
      alert("请输入房间号！");
      return;
    }
    connect();
    
    let checkInterval = setInterval(() => {
      if(wsReady) {
        clearInterval(checkInterval);
        ws.send(JSON.stringify({type:'create', room: roomId}));
        statusText.textContent = `房间${roomId}创建中...`;
      }
    }, 100);
  }

  // 加入房间
  function joinRoom() {
    roomId = roomInput.value.trim();
    if(!roomId) {
      alert("请输入房间号！");
      return;
    }
    connect();
    
    let checkInterval = setInterval(() => {
      if(wsReady) {
        clearInterval(checkInterval);
        ws.send(JSON.stringify({type:'join', room: roomId}));
        statusText.textContent = `加入房间${roomId}中...`;
        // 初始化手牌
        setTimeout(() => {
          isOpponentJoined = true;
          deck = makeDeck();
          myHand = deck.splice(0,5);
          opponentHand = deck.splice(0,5);
          showMyHand();
          showOpponentHand();
          statusText.textContent = `已加入房间${roomId}，游戏开始！`;
        }, 800);
      }
    }, 100);
  }

  // 出牌逻辑（自己看不到手牌，但后台能判断）
  function play() {
    if(!isOpponentJoined) {
      alert("对手还没加入，请先等对手连接！");
      return;
    }
    if(!wsReady) {
      alert("连接还没就绪，请稍等！");
      return;
    }
    
    let n = parseInt(num.value);
    let c = parseInt(cnt.value);
    // 后台统计自己手牌中对应数字的数量（不显示给玩家）
    let count = myHand.filter(x=>x==n).length;
    
    if(count >= c) {
      // 本地出牌（后台减少手牌）
      for(let i=0;i<c;i++){
        let idx = myHand.indexOf(n);
        myHand.splice(idx,1);
      }
      played.push({num:n,count:c});
      showMyHand(); // 更新自己的手牌背面数量
      showPlayed();
      
      // 发送出牌消息
      ws.send(JSON.stringify({
        type:'play', 
        room: roomId,
        card: n, 
        count: c
      }));
      statusText.textContent = `已打出${c}张${n}，等待对手...`;
    } else {
      alert(`你没有${c}张${n}！（后台检测）`);
    }
  }

  // 结束回合补牌
  function endTurn() {
    if(!isOpponentJoined) {
      alert("对手还没加入！");
      return;
    }

    // 补牌至5张（后台补，显示背面）
    while(myHand.length <5 && deck.length>0) {
      myHand.push(deck.pop());
    }
    // 对手同步补牌
    while(opponentHand.length <5 && deck.length>0) {
      opponentHand.push(deck.pop());
    }
    showMyHand();
    showOpponentHand();
    statusText.textContent = `回合结束，已补牌！当前手牌${myHand.length}张`;
  }

  // 显示自己的手牌（背面，只显示数量，看不到数字）
  function showMyHand() {
    let myEl = document.getElementById('my');
    myEl.innerHTML = "";
    myHand.forEach(() => {
      // 自己的手牌显示「背」字，看不到数字
      myEl.innerHTML += `<div class='my-card'>背</div>`;
    });
    if(myHand.length === 0) {
      myEl.innerHTML = "无手牌";
    }
  }

  // 显示对手的手牌（真实数字）
  function showOpponentHand() {
    let opponentEl = document.getElementById('opponent');
    opponentEl.innerHTML = "";
    opponentHand.forEach(num => {
      // 对手的手牌显示真实数字
      opponentEl.innerHTML += `<div class='opponent-card'>${num}</div>`;
    });
    if(opponentHand.length === 0) {
      opponentEl.innerHTML = "无手牌";
    }
  }

  // 显示已打出的牌
  function showPlayed() {
    let playedEl = document.getElementById('played');
    playedEl.innerHTML = "";
    played.forEach(x=>{
      for(let i=0;i<x.count;i++){
        playedEl.innerHTML += `<div class='opponent-card'>${x.num}</div>`;
      }
    });
    if(played.length === 0) {
      playedEl.innerHTML = "无";
    }
  }
</script>
</body>
</html>
